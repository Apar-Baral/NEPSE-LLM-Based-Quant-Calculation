labels:
  forward_return_threshold_pct: 5.0
  max_drawdown_threshold_pct: 3.0
  forward_windows_days: [3, 5, 10, 20]

signals:
  watch_zscore: 1.5
  trigger_probability: 0.60
  confirmed_probability: 0.65
  early_momentum_score: 70
  # Floorsheet-only mode (no accumulation Excel yet)
  distribution_mode: true
  dist_trigger_probability: 0.30
  dist_confirmed_probability: 0.40
  dist_early_momentum_score: 20
  dist_broker_pressure_trigger: 18
  dist_invalidate_drs: 85

ml:
  test_size_days: 30
  random_state: 42
  top_k_scanner: 20

multimodal:
  epochs: 40
  learning_rate: 0.001
  batch_size: 64
  max_training_samples: 8000
  blend_weight: 0.5  # mm_p_long vs LightGBM in predict()

scanner:
  high_volume_top_n: 0  # 0 = all symbols (no turnover cap)
  brief_detail_n: 25
  min_daily_volume: 0
  rank_by: daily_turnover_lac  # 1D floorsheet turnover only
  llm_score_max: 60
  llm_refresh_max_fetch: 12  # max new LLM API calls per refresh (avoids hang)

agents:
  max_workers: 48          # parallel threads for 100+ agent fleet
  broker_agent_count: 50   # per-broker desk agents (top market brokers)
  domain_weights:
    quant: 0.30
    financial: 0.22
    broker: 0.28
    llm: 0.20

brokers:
  watch_list: [58, 49, 45, 55, 34, 6, 38, 43, 70]
  analyze_top_n: 0  # 0 = all brokers ranked by activity (no cap)
  # Circular — universe-calibrated (not every stock)
  circular_flag_percentile: 0.93
  min_wash_score: 62
  min_activity_qty: 8000
  reciprocal_broker_min: 3
  reciprocal_min_two_side_ratio: 0.30

llm:
  provider: deepseek  # deepseek | openai | ollama
  base_url: http://localhost:11434
  model: llama3.1
  openai_model: gpt-4o-mini
  deepseek_base_url: https://api.deepseek.com
  deepseek_model: deepseek-v4-pro  # or deepseek-reasoner, deepseek-v4-flash, deepseek-chat
  temperature: 0.2
  max_tokens: 4096

alerts:
  enabled: false
  webhook_url: ""
